workflows:
  android-apk-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17
    scripts:
      - name: Fix withValues error in packages
        script: |
          flutter pub get
          
          # Fix youtube_player_flutter
          sed -i 's/\.withValues(alpha: /\.withOpacity(/g' \
            $HOME/.pub-cache/hosted/pub.dev/youtube_player_flutter-9.1.3/lib/src/widgets/progress_bar.dart
          
          # Fix flutter_spinkit
          sed -i 's/\.withValues(alpha: /\.withOpacity(/g' \
            $HOME/.pub-cache/hosted/pub.dev/flutter_spinkit-5.2.2/lib/src/double_bounce.dart

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk