name: school_management_system
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - all compatible with firebase_core ^3.x
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.5
  firebase_auth: ^5.5.1
  firebase_messaging: ^15.2.5
  firebase_storage: ^12.4.5

  # UI
  cupertino_icons: ^1.0.8
  custom_navigation_bar: ^0.8.2
  flutter_svg: ^2.0.10+1
  flutter_screenutil: ^5.9.3
  flutter_zoom_drawer: ^3.2.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_easyloading: ^3.0.5

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # Auth
  google_sign_in: ^6.2.1

  # File & Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  open_file: ^3.5.4
  path_provider: ^2.1.4
  flutter_downloader: ^1.11.8
  permission_handler: ^11.3.1

  # Network
  dio: ^5.7.0
  url_launcher: ^6.3.1

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Other
  flutter_phoenix: ^1.1.1
  intl: ^0.19.0
  table_calendar: ^3.1.2
  youtube_player_flutter: ^9.1.3   # ✅ Updated from 9.1.1 to fix .withValues error

dependency_overrides:
  file: ^7.0.0   # ✅ Fixes createSync 'exclusive' parameter conflict with Dart SDK

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/LOGO2.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: RedHatDisplay-Bold
      fonts:
        - asset: assets/fonts/RedHatDisplay-Bold.ttf
    - family: RedHatDisplay-Light
      fonts:
        - asset: assets/fonts/RedHatDisplay-Light.ttf
    - family: RedHatDisplay-Medium
      fonts:
        - asset: assets/fonts/RedHatDisplay-Medium.ttf
    - family: RedHatDisplay-Regular
      fonts:
        - asset: assets/fonts/RedHatDisplay-Regular.ttf
    - family: SFProDisplay-Bold
      fonts:
        - asset: assets/fonts/SFProDisplay-Bold.OTF
    - family: SFProDisplay-Medium
      fonts:
        - asset: assets/fonts/SFProDisplay-Medium.OTF
    - family: SFProDisplay-Regular
      fonts:
        - asset: assets/fonts/SFProDisplay-Regular.OTF